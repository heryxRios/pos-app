<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo usuario · POS</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar('usuarios')}"></div>

    <div class="main">
        <div class="page-header">
            <div>
                <h1>Nuevo usuario</h1>
                <div class="subtitle">Crea una cuenta de acceso para tu personal</div>
            </div>
        </div>

        <div class="card" style="max-width: 480px;">
            <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol" th:field="*{rol}">
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">CAJERO</option>
                    </select>
                </div>

                <div style="display:flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Crear usuario</button>
                    <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
