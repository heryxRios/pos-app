# =========================
# Configuracion del servidor
# =========================
server.port=8080
server.servlet.context-path=/

# =========================
# Base de datos MySQL
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/pos_db?useSSL=false&serverTimezone=America/Mexico_City&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
# ddl-auto=update es comodo en desarrollo, pero en produccion se recomienda "validate"
# y manejar el esquema con migraciones (ej. Flyway).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =========================
# Thymeleaf
# =========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================
# Localizacion (moneda, formato)
# =========================
spring.web.locale=es_MX
spring.web.locale-resolver=fixed

# =========================
# Logging
# =========================
logging.level.org.springframework.security=INFO
logging.level.com.tienda.pos=DEBUG

# =========================
# Configuracion propia del negocio (ejemplo)
# =========================
pos.nombre-negocio=Mi Tienda
pos.moneda=MXN
pos.impuesto-porcentaje=16
